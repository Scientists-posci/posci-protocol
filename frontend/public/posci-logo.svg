<?xml version="1.0" encoding="UTF-8"?>
<!--
  POSCI primary token logo. 512×512 viewBox, square (renders as a perfect circle
  thanks to the outer mask). Uses only solid fills + linear/radial gradients so
  it rasterises cleanly to PNG at any wallet/explorer size.

  Color palette matches the site theme:
    deep blue     #1d4ed8 → #0a1233
    cyan accent   #06b6d4 → #38bdf8
    pure white    glyph + halo rings
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="78%">
      <stop offset="0%"  stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0a1233"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="phi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background disc -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- inner highlight ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- orbital ring (tilted ellipse) -->
  <g transform="rotate(-22 256 256)">
    <ellipse cx="256" cy="256" rx="218" ry="78" fill="none" stroke="url(#ring)" stroke-width="3"/>
    <!-- electron node on the orbit -->
    <circle cx="38" cy="252" r="11" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="474" cy="260" r="9" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- second orbital ring (cross-axis) -->
  <g transform="rotate(36 256 256)">
    <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
    <circle cx="56" cy="252" r="6" fill="#ffffff" opacity="0.65"/>
  </g>

  <!-- Φ glyph -->
  <g filter="url(#glow)">
    <text
      x="256" y="296"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-weight="800"
      font-size="288"
      fill="url(#phi)"
      letter-spacing="-6"
    >Φ</text>
  </g>
</svg>
